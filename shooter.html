<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RETRO SHOOTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 800;
const H = canvas.height = 600;

// ─── Constants ───────────────────────────────────────────────────────────────
const PLAYER_SPEED  = 180;
const BULLET_SPEED  = 520;
const SHOOT_DELAY   = 180;   // ms
const WAVE_INTERVAL = 12000; // ms
const TILE          = 40;

// ─── State ───────────────────────────────────────────────────────────────────
let player, bullets, enemies, particles, keys, mouse;
let score, wave, waveTimer, waveDisplay, gameOver, lastTime, frameCount;
let lastShot = 0;
let muzzleTimer = 0;
let invTimer = 0; // invincibility frames after hit

function initState() {
  player = {
    x: W / 2, y: H / 2,
    hp: 3, maxHp: 3,
    walkFrame: 0, walkTick: 0,
    moving: false,
    aimAngle: 0,
  };
  bullets   = [];
  enemies   = [];
  particles = [];
  keys      = {};
  mouse     = { x: W / 2, y: H / 2 };
  score     = 0;
  wave      = 0;
  waveTimer = 0;
  waveDisplay = 0;
  gameOver  = false;
  lastTime  = performance.now();
  frameCount = 0;
  muzzleTimer = 0;
  invTimer    = 0;
  lastShot    = 0;
  spawnWave();
}

// ─── Input ───────────────────────────────────────────────────────────────────
window.addEventListener('keydown',  e => { keys[e.key] = true;  e.preventDefault(); });
window.addEventListener('keyup',    e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', e => {
  if (gameOver) { initState(); return; }
  tryShoot();
});
// auto-fire while held
canvas.addEventListener('mousemove', () => {
  if (gameOver) return;
  if (mouse.down) tryShoot();
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup',   () => mouse.down = false);

// ─── Spawning ─────────────────────────────────────────────────────────────────
function spawnWave() {
  wave++;
  waveDisplay = 2500; // ms to show wave banner

  const count = 4 + wave * 2;
  for (let i = 0; i < count; i++) {
    const delay = i * 300;
    setTimeout(() => spawnEnemy(), delay);
  }
}

function spawnEnemy() {
  // pick edge: 0=top 1=right 2=bottom 3=left
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -20; }
  else if (edge === 1) { x = W + 20; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 20; }
  else                 { x = -20; y = Math.random() * H; }

  // type distribution changes with wave
  let type;
  const r = Math.random();
  if (wave >= 5 && r < 0.2)      type = 'tank';
  else if (wave >= 3 && r < 0.5) type = 'runner';
  else                            type = 'walker';

  const cfg = ENEMY_CFG[type];

  enemies.push({
    x, y, type,
    hp: cfg.hp, maxHp: cfg.hp,
    speed: cfg.speed + Math.random() * 20,
    r: cfg.r,
    walkFrame: 0, walkTick: 0,
    hitTimer: 0,
    deathTimer: -1,
    dead: false,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

const ENEMY_CFG = {
  walker: { hp: 1, speed: 75,  r: 14, color: '#c0392b', eyeColor: '#fff' },
  runner: { hp: 1, speed: 145, r: 10, color: '#e67e22', eyeColor: '#fff' },
  tank:   { hp: 3, speed: 50,  r: 20, color: '#8e44ad', eyeColor: '#fff' },
};

// ─── Shooting ────────────────────────────────────────────────────────────────
function tryShoot() {
  const now = Date.now();
  if (now - lastShot < SHOOT_DELAY) return;
  lastShot = now;
  muzzleTimer = 6; // frames

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const ox = Math.cos(angle) * 18;
  const oy = Math.sin(angle) * 18;

  bullets.push({
    x: player.x + ox,
    y: player.y + oy,
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    life: 1.4, // seconds
  });
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 140;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.4,
      maxLife: 0.5,
      r: 2 + Math.random() * 3,
      color,
    });
  }
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  frameCount++;
  waveTimer    += dt * 1000;
  if (waveDisplay > 0) waveDisplay -= dt * 1000;
  if (muzzleTimer > 0) muzzleTimer--;
  if (invTimer    > 0) invTimer   -= dt * 1000;

  // ── Auto-fire while mouse held
  if (mouse.down) tryShoot();

  // ── Wave progression
  if (waveTimer >= WAVE_INTERVAL && enemies.filter(e => !e.dead).length < 5) {
    waveTimer = 0;
    spawnWave();
  }

  // ── Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

  const moving = dx !== 0 || dy !== 0;
  player.moving = moving;

  if (moving) {
    const len = Math.sqrt(dx*dx + dy*dy);
    player.x += (dx / len) * PLAYER_SPEED * dt;
    player.y += (dy / len) * PLAYER_SPEED * dt;
    player.x = Math.max(12, Math.min(W - 12, player.x));
    player.y = Math.max(12, Math.min(H - 12, player.y));

    player.walkTick++;
    if (player.walkTick >= 8) {
      player.walkTick = 0;
      player.walkFrame = (player.walkFrame + 1) % 4;
    }
  }

  player.aimAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // ── Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    return b.life > 0 && b.x > -10 && b.x < W+10 && b.y > -10 && b.y < H+10;
  });

  // ── Enemies
  for (const e of enemies) {
    if (e.dead) {
      e.deathTimer -= dt * 1000;
      continue;
    }
    if (e.hitTimer > 0) e.hitTimer -= dt * 1000;

    // move toward player
    const edx = player.x - e.x;
    const edy = player.y - e.y;
    const dist = Math.sqrt(edx*edx + edy*edy);
    if (dist > 1) {
      e.x += (edx / dist) * e.speed * dt;
      e.y += (edy / dist) * e.speed * dt;
    }

    // walk animation
    e.walkTick++;
    if (e.walkTick >= 10) {
      e.walkTick = 0;
      e.walkFrame = (e.walkFrame + 1) % 2;
    }

    // bullet collision
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      const bx = b.x - e.x, by = b.y - e.y;
      if (Math.sqrt(bx*bx + by*by) < e.r + 4) {
        bullets.splice(bi, 1);
        e.hp--;
        e.hitTimer = 120; // ms flash
        spawnParticles(b.x, b.y, '#ffdd57', 4);
        if (e.hp <= 0) {
          e.dead = true;
          e.deathTimer = 400; // ms death anim
          score += e.type === 'tank' ? 30 : e.type === 'runner' ? 20 : 10;
          spawnParticles(e.x, e.y, ENEMY_CFG[e.type].color, 12);
        }
        break;
      }
    }

    // player collision
    if (!e.dead && invTimer <= 0) {
      const px = player.x - e.x, py = player.y - e.y;
      if (Math.sqrt(px*px + py*py) < e.r + 12) {
        player.hp--;
        invTimer = 1200; // ms invincibility
        spawnParticles(player.x, player.y, '#ff6b6b', 10);
        if (player.hp <= 0) gameOver = true;
      }
    }
  }

  // remove fully-dead enemies whose anim finished
  enemies = enemies.filter(e => !e.dead || e.deathTimer > 0);

  // ── Particles
  particles = particles.filter(p => {
    p.x    += p.vx * dt;
    p.y    += p.vy * dt;
    p.vx   *= 0.88;
    p.vy   *= 0.88;
    p.life -= dt;
    return p.life > 0;
  });
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r, fill) {
  ctx.fillStyle = fill;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

function drawHeart(cx, cy, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx, cy, cx - size, cy, cx - size, cy + size * 0.4);
  ctx.bezierCurveTo(cx - size, cy + size, cx, cy + size * 1.3, cx, cy + size * 1.6);
  ctx.bezierCurveTo(cx, cy + size * 1.3, cx + size, cy + size, cx + size, cy + size * 0.4);
  ctx.bezierCurveTo(cx + size, cy, cx, cy, cx, cy + size * 0.3);
  ctx.fill();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  // Floor tiles
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#242424';
  ctx.lineWidth = 1;
  for (let tx = 0; tx <= W; tx += TILE) {
    ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, H); ctx.stroke();
  }
  for (let ty = 0; ty <= H; ty += TILE) {
    ctx.beginPath(); ctx.moveTo(0, ty); ctx.lineTo(W, ty); ctx.stroke();
  }

  // Shadow under player
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(player.x, player.y + 14, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Bullets
  for (const b of bullets) {
    const t = Math.min(1, b.life / 0.3);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(Math.atan2(b.vy, b.vx));
    // tracer glow
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = '#fff8c0';
    ctx.fillRect(-6, -2, 12, 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Enemies
  for (const e of enemies) {
    const cfg = ENEMY_CFG[e.type];
    const bob = e.dead ? 0 : Math.sin(frameCount * 0.18 + e.bobOffset) * 2;

    ctx.save();
    ctx.translate(e.x, e.y + bob);

    if (e.dead) {
      // death explosion ring
      const prog = 1 - e.deathTimer / 400;
      const radius = prog * e.r * 3.5;
      ctx.globalAlpha = 1 - prog;
      ctx.strokeStyle = cfg.color;
      ctx.lineWidth   = 3;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      continue;
    }

    // hit flash
    const flashing = e.hitTimer > 0 && Math.floor(e.hitTimer / 40) % 2 === 0;

    // body
    const color = flashing ? '#fff' : cfg.color;
    ctx.fillStyle = color;
    const s = e.r;
    // slightly squash/stretch while walking
    const scaleX = e.walkFrame === 0 ? 1.05 : 0.95;
    const scaleY = e.walkFrame === 0 ? 0.95 : 1.05;
    ctx.save();
    ctx.scale(scaleX, scaleY);
    ctx.beginPath();
    ctx.roundRect(-s, -s, s * 2, s * 2, 4);
    ctx.fill();

    // HP cracks for tank
    if (e.type === 'tank' && !flashing) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1.5;
      if (e.hp <= 2) {
        ctx.beginPath(); ctx.moveTo(-4, -s+2); ctx.lineTo(0, 0); ctx.lineTo(4, -s+2); ctx.stroke();
      }
      if (e.hp <= 1) {
        ctx.beginPath(); ctx.moveTo(-s+2, -2); ctx.lineTo(0, 0); ctx.lineTo(-s+2, 4); ctx.stroke();
      }
    }
    ctx.restore();

    // eyes
    ctx.fillStyle = flashing ? '#333' : cfg.eyeColor;
    const eyeY = -s * 0.2;
    ctx.beginPath(); ctx.arc(-s * 0.3, eyeY, s * 0.18, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( s * 0.3, eyeY, s * 0.18, 0, Math.PI * 2); ctx.fill();

    // angry brows
    ctx.strokeStyle = flashing ? '#333' : '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-s*0.5, eyeY - s*0.3); ctx.lineTo(-s*0.1, eyeY - s*0.15); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo( s*0.5, eyeY - s*0.3); ctx.lineTo( s*0.1, eyeY - s*0.15); ctx.stroke();

    // HP bar (for tank)
    if (e.type === 'tank') {
      const bw = e.r * 2.4;
      const bh = 4;
      const bx = -bw / 2;
      const by = -e.r - 10;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#9b59b6';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
    }

    ctx.restore();
  }

  // ── Player
  ctx.save();
  ctx.translate(player.x, player.y);

  // invincibility flicker
  if (invTimer > 0 && Math.floor(invTimer / 80) % 2 === 1) {
    ctx.globalAlpha = 0.35;
  }

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 14, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // legs walk animation
  const legOffset = player.moving ? (player.walkFrame < 2 ? 5 : -5) : 0;
  // left leg
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-7, 6 + legOffset,  6, 10);
  // right leg
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect( 1, 6 - legOffset,  6, 10);

  // boots
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(-8, 14 + legOffset, 7, 4);
  ctx.fillRect( 1, 14 - legOffset, 7, 4);

  // body
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(-9, -8, 18, 16, 3);
  ctx.fill();

  // vest detail
  ctx.fillStyle = '#1e8449';
  ctx.fillRect(-4, -7, 8, 14);

  // head
  ctx.fillStyle = '#f39c12';
  ctx.beginPath();
  ctx.arc(0, -14, 9, 0, Math.PI * 2);
  ctx.fill();

  // helmet
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.ellipse(0, -19, 9, 5, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(-9, -21, 18, 4);

  // eye (facing direction of aim)
  const eyeAngle  = player.aimAngle;
  const eyeOffset = 4;
  const ex = Math.cos(eyeAngle) * eyeOffset * 0.4;
  const ey = Math.sin(eyeAngle) * eyeOffset * 0.3 - 14;
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // arm + gun (rotates toward mouse)
  ctx.save();
  ctx.rotate(player.aimAngle);

  // upper arm
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(2, -3, 12, 6);

  // gun body
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(10, -3, 16, 5);
  // barrel
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(22, -1.5, 8, 3);
  // grip
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(12, 2, 6, 7);

  // muzzle flash
  if (muzzleTimer > 0) {
    const flashAlpha = muzzleTimer / 6;
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#ffe066';
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur  = 12;
    ctx.beginPath();
    ctx.arc(30, 0, 5 + muzzleTimer, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore(); // arm rotation
  ctx.globalAlpha = 1;
  ctx.restore(); // player translate

  // ── Particles
  for (const p of particles) {
    const alpha = p.life / (p.maxLife || 0.5);
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // ── HUD
  drawHUD();

  // ── Wave banner
  if (waveDisplay > 0) {
    const alpha = Math.min(1, waveDisplay / 400);
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = 'rgba(0,0,0,0.55)';
    ctx.fillRect(W/2 - 120, H/2 - 35, 240, 60);
    ctx.fillStyle = '#ffe066';
    ctx.font      = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`WAVE  ${wave}`, W/2, H/2 + 8);
    ctx.globalAlpha = 1;
  }

  // ── Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#e74c3c';
    ctx.font      = 'bold 64px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 40);

    ctx.fillStyle = '#eee';
    ctx.font      = '28px monospace';
    ctx.fillText(`SCORE:  ${score}`, W/2, H/2 + 10);
    ctx.fillText(`WAVE:   ${wave}`, W/2, H/2 + 46);

    ctx.fillStyle = '#a0c4ff';
    ctx.font      = '18px monospace';
    ctx.fillText('click to restart', W/2, H/2 + 96);
  }
}

function drawHUD() {
  // ── Score
  ctx.fillStyle   = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W - 200, 8, 192, 36);
  ctx.fillStyle = '#ffe066';
  ctx.font      = 'bold 22px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${String(score).padStart(6,'0')}`, W - 16, 34);
  ctx.fillStyle = '#aaa';
  ctx.font      = '13px monospace';
  ctx.fillText('SCORE', W - 150, 28);

  // ── Health hearts
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(8, 8, 20 + player.maxHp * 28, 36);

  for (let i = 0; i < player.maxHp; i++) {
    const hx = 22 + i * 28;
    const hy = 14;
    const alive = i < player.hp;
    drawHeart(hx, hy, 7, alive ? '#e74c3c' : '#444');
  }

  // ── Wave indicator (small, bottom-right)
  ctx.fillStyle = '#666';
  ctx.font      = '13px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`wave ${wave}`, W - 10, H - 10);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (!gameOver) update(dt);
  render();

  requestAnimationFrame(loop);
}

// ─── Start ───────────────────────────────────────────────────────────────────
initState();
requestAnimationFrame(loop);
</script>
</body>
</html>
