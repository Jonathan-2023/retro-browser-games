<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #4ecdc4; }
    .cell.win { background: #0f3460; box-shadow: 0 0 15px rgba(160, 196, 255, 0.4); }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #0f3460;
      color: #eee;
      border: 2px solid #a0c4ff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #1a4a8a; }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    X wins: <span id="scoreX">0</span>
    Draws: <span id="scoreDraw">0</span>
    O wins: <span id="scoreO">0</span>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('scoreX');
    const scoreO = document.getElementById('scoreO');
    const scoreDraw = document.getElementById('scoreDraw');

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let cells, current, over, scores = { X: 0, O: 0, D: 0 };

    function init() {
      cells = Array(9).fill('');
      current = 'X';
      over = false;
      status.textContent = "X's turn";
      board.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', handleClick);
        board.appendChild(cell);
      }
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (over || cells[i]) return;
      cells[i] = current;
      e.target.textContent = current;
      e.target.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => board.children[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        over = true;
      } else if (cells.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.D++;
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }

      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.D;
    }

    function checkWin() {
      return WINS.find(([a, b, c]) => cells[a] && cells[a] === cells[b] && cells[b] === cells[c]) || null;
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
